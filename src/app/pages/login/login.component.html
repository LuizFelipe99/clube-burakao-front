<!-- login.component.html -->

<h2>Login</h2>

<form (ngSubmit)="login()">
  <input type="email" [(ngModel)]="email" name="email" placeholder="Email">
  <input type="password" [(ngModel)]="password" name="password" placeholder="Senha">

  <button type="submit">Entrar</button>
</form>

<p *ngIf="error">{{ error }}</p>
